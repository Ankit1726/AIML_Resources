<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <title>Flask App</title>

     <style>
          * {
               margin: 0;
               padding: 0;
               box-sizing: border-box;
               font-family: Arial, Helvetica, sans-serif;
          }

          body {
               min-height: 100vh;
               background: linear-gradient(135deg, #667eea, #764ba2);
               display: flex;
               justify-content: center;
               align-items: center;
          }

          .card {
               background: #ffffff;
               padding: 40px 50px;
               border-radius: 12px;
               width: 100%;
               max-width: 520px;
               text-align: center;
               box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
          }

          h1 {
               color: #333;
               margin-bottom: 15px;
               font-size: 32px;
          }

          p {
               color: #555;
               font-size: 16px;
               line-height: 1.6;
               margin-bottom: 25px;
          }

          .badge {
               display: inline-block;
               padding: 8px 16px;
               background: #667eea;
               color: #fff;
               border-radius: 20px;
               font-size: 14px;
               font-weight: bold;
          }

          footer {
               margin-top: 20px;
               font-size: 13px;
               color: #777;
          }
     </style>
</head>

<body>

     <div class="card">
          <h1>Welcome to My Flask App 🚀</h1>
          <p>
               This is a simple and clean Flask web application.
               It demonstrates how backend logic connects with
               a styled frontend using HTML and CSS.
          </p>

          <span class="badge">Flask • Python • Backend</span>

          <footer>
               <p>Built with ❤️ using Flask</p>
          </footer>
     </div>

</body>

</html>
