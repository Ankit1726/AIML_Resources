<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <title>Success | Flask App</title>

     <style>
          * {
               margin: 0;
               padding: 0;
               box-sizing: border-box;
               font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
          }

          body {
               min-height: 100vh;
               background: linear-gradient(135deg, #43cea2, #185a9d);
               display: flex;
               justify-content: center;
               align-items: center;
          }

          .success-card {
               background: #ffffff;
               width: 100%;
               max-width: 520px;
               padding: 45px 50px;
               border-radius: 16px;
               text-align: center;
               box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
          }

          .icon {
               font-size: 52px;
               margin-bottom: 15px;
          }

          h2 {
               font-size: 30px;
               color: #222;
               margin-bottom: 10px;
          }

          h2 span {
               color: #185a9d;
          }

          p {
               font-size: 16px;
               color: #555;
               line-height: 1.6;
               margin-bottom: 30px;
          }

          .btn {
               display: inline-block;
               padding: 12px 28px;
               background: #185a9d;
               color: #fff;
               text-decoration: none;
               border-radius: 25px;
               font-size: 15px;
               font-weight: 600;
               transition: background 0.3s ease;
          }

          .btn:hover {
               background: #144a7a;
          }

          footer {
               margin-top: 25px;
               font-size: 13px;
               color: #777;
          }
     </style>
</head>

<body>

     <div class="success-card">
          <div class="icon">✅</div>

          <h2>Thank you, <span>{{ name }}</span>!</h2>

          <p>
               Your message has been sent successfully.
               We appreciate you taking the time to reach out and
               will get back to you as soon as possible.
          </p>

          <a href="/form" class="btn">Back to Contact Form</a>

          <footer>
               <p>Flask Contact Form • Submission Complete</p>
          </footer>
     </div>

</body>

</html>
