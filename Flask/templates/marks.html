<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <title>Student Marks Form</title>

     <!-- Flask static CSS -->
     <link rel="stylesheet" href="{{ url_for('static', filename='marks.css') }}">
</head>

<body>

     <div class="form-wrapper">
          <h2>Student Marks Entry</h2>
          <p>Enter subject marks and submit for processing</p>

          <form action="/submit" method="post">
               <div class="input-group">
                    <label for="science">Science</label>
                    <input type="number" id="science" name="science" placeholder="Enter marks" required>
               </div>

               <div class="input-group">
                    <label for="maths">Maths</label>
                    <input type="number" id="maths" name="maths" placeholder="Enter marks" required>
               </div>

               <div class="input-group">
                    <label for="c">C Programming</label>
                    <input type="number" id="c" name="c" placeholder="Enter marks" required>
               </div>

               <div class="input-group">
                    <label for="datascience">Data Science</label>
                    <input type="number" id="datascience" name="datascience" placeholder="Enter marks" required>
               </div>

               <button type="submit">Submit Marks</button>
          </form>
     </div>

</body>

</html>
